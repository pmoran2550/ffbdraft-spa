<div *ngIf="player">
    <mat-card class="player-card">
      <mat-card-header>
        <mat-card-title>
          {{ player.rank}} {{ player.name}}
        </mat-card-title>
        <mat-card-subtitle>
          <div class="subtitle-row">
            <span>{{ player.position}} - {{ player.nflTeam }} (Bye: {{ player.byeWeek }})</span>
            <div class="content-parent-FFBTeam">
                <div class="content-item" *ngIf="(isAdmin$ | async) && !isEditing">
                    <button mat-icon-button (click)="editFFBTeam(player)" >
                        <mat-icon>edit</mat-icon>
                    </button>
                </div>
                <div class="content-item-FFBTeam" *ngIf="!isEditing">FFB Manager: {{ player.ffbTeamManager}}</div>
            </div>
          </div>
        </mat-card-subtitle>
      </mat-card-header>
    </mat-card>
</div>
